name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pre-merge regression
        run: npm run premerge

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate npm package contents
        run: |
          npm pack --dry-run 2>&1 | tee pack.log
          # fail if evidence, cache, or local settings leak
          ! grep -q 'settings.local.json' pack.log
          ! grep -q 'stdd/evidence' pack.log
          ! grep -q 'stdd/reports' pack.log
          ! grep -q 'stdd/runtime' pack.log
          ! grep -q 'progress.jsonl' pack.log
          ! grep -q 'stdd/graph/cache' pack.log
          echo "Package contents clean"

      - name: Package and smoke test
        run: npm run test:smoke

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: stdd-copilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: |
          docker run --rm stdd-copilot:ci --version
          docker run --rm stdd-copilot:ci --help | grep -q init
          echo "Docker image verified"
