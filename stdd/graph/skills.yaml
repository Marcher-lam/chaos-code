# STDD Copilot Skill Graph 定义
# 版本: 1.0
# 描述: Specification & Test-Driven Development 工作流

version: "1.0"
name: "STDD Copilot Skill Graph"
description: "Specification & Test-Driven Development Workflow"

# 全局配置
config:
  max_parallel: 4
  timeout: 3600
  retry_count: 3
  on_failure: "rollback"

# 自动编排配置 (Agent 读取后自主推进工作流)
auto_orchestration:
  enabled: true
  description: "Agent 读取此配置后，应自主推进工作流，无需用户记住每个命令"
  
  # 主要工作流路径
  intents:
    feature:
      description: "新功能开发（从0到1）"
      phases:
        - skill: stdd-init
          auto_advance: true
          prompt: "用户需要新功能时"
        - skill: stdd-propose
          auto_advance: true
        - skill: stdd-clarify
          auto_advance: true
        - skill: stdd-confirm
          auto_advance: false
          gate: human_approval
          prompt: "展示澄清结果，等待用户确认"
        - skill: stdd-spec
          auto_advance: true
        - skill: stdd-plan
          auto_advance: true
        - skill: stdd-apply
          auto_advance: true
          loop: true
        - skill: stdd-verify
          auto_advance: true
        - skill: stdd-mutation
          auto_advance: true
          condition: "mutation_enabled"
        - skill: stdd-archive
          auto_advance: false
          gate: human_approval
          prompt: "展示验证结果，等待用户确认归档"
    
    brownfield:
      description: "接手已有项目，深度阅读后按需修改"
      phases:
        - skill: stdd-explore
          auto_advance: true
          prompt: "深度阅读项目代码，理解架构、技术栈、模块依赖"
        - skill: stdd-init
          auto_advance: true
          prompt: "初始化 STDD 工作区"
        - skill: stdd-new
          auto_advance: true
        - skill: stdd-propose
          auto_advance: true
        - skill: stdd-confirm
          auto_advance: false
          gate: human_approval
          prompt: "展示修改方案和影响分析，等待用户确认"
        - skill: stdd-spec
          auto_advance: true
        - skill: stdd-plan
          auto_advance: true
        - skill: stdd-apply
          auto_advance: true
        - skill: stdd-verify
          auto_advance: true
        - skill: stdd-archive
          auto_advance: false
          gate: human_approval
    
    hotfix:
      description: "快速修复 Bug"
      phases:
        - skill: stdd-issue
          auto_advance: true
        - skill: stdd-apply
          auto_advance: true
        - skill: stdd-verify
          auto_advance: true
        - skill: stdd-archive
          auto_advance: false
          gate: human_approval
    
    turbo:
      description: "一键全流程（仅在确认点和归档点暂停）"
      phases:
        - skill: stdd-propose
          auto_advance: true
        - skill: stdd-confirm
          auto_advance: false
          gate: human_approval
        - skill: stdd-spec
          auto_advance: true
        - skill: stdd-plan
          auto_advance: true
        - skill: stdd-apply
          auto_advance: true
        - skill: stdd-verify
          auto_advance: true
        - skill: stdd-archive
          auto_advance: false
          gate: human_approval
    
    explore:
      description: "探索分析"
      phases:
        - skill: stdd-explore
          auto_advance: true
        - skill: stdd-brainstorm
          auto_advance: true
        - skill: stdd-final-doc
          auto_advance: true

  # 自动触发的辅助技能（Agent 在合适时机自动调用）
  auto_triggers:
    - skill: stdd-guard
      trigger: "每次 apply 完成后"
    - skill: stdd-mutation
      trigger: "验证前"
    - skill: stdd-metrics
      trigger: "每完成 5 个 task"
    - skill: stdd-api-spec
      trigger: "检测到 API 需求时"
    - skill: stdd-schema
      trigger: "检测到类型需求时"
    - skill: stdd-constitution
      trigger: "归档前"
  
  # Agent 进度汇报模板
  progress_template: |
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    📍 Phase {current}/{total}: {phase_label}
    ✅ 上一阶段: {last_result}
    🔜 下一阶段: {next_phase}
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # 失败处理策略
  failure_handling:
    max_retries: 3
    strategies:
      - retry_same    # 第 1 次：重试
      - fix_packet    # 第 2 次：读取 fix-packet 降级
      - circuit_break # 第 3 次：熔断，汇报用户

# 条件变量
variables:
  project_type: "${PROJECT_TYPE:-node}"
  test_framework: "${TEST_FRAMEWORK:-vitest}"
  has_database: "${HAS_DATABASE:-false}"
  has_api: "${HAS_API:-false}"

# Skill 节点定义
skills:
  # ========== 初始化阶段 ==========
  stdd-init:
    description: "初始化环境与插件记忆库"
    phase: init
    timeout: 300
    outputs:
      - "stdd/memory/foundation.md"
      - "stdd/memory/components.md"
    next:
      - stdd-propose
    metadata:
      priority: required
      category: setup

  # ========== 需求阶段 ==========
  stdd-propose:
    description: "提出原始需求草案"
    phase: propose
    inputs:
      - "user_request"
    outputs:
      - "stdd/drafts/proposal.md"
    next:
      - stdd-clarify
    metadata:
      priority: required
      category: requirement

  stdd-clarify:
    description: "系统主动交互澄清"
    phase: clarify
    inputs:
      - "stdd/drafts/proposal.md"
    outputs:
      - "stdd/drafts/clarification.json"
    next:
      - stdd-confirm
    metadata:
      priority: required
      category: requirement
      interactive: true

  stdd-confirm:
    description: "人类确认需求"
    phase: confirm
    inputs:
      - "stdd/drafts/clarification.json"
    outputs:
      - "stdd/approved/requirement.md"
    next:
      - stdd-spec
    condition: "${clarification_complete} == true"
    metadata:
      priority: required
      category: requirement
      gate: human_approval

  # ========== 规格阶段 ==========
  stdd-spec:
    description: "生成 BDD 规格"
    phase: spec
    inputs:
      - "stdd/approved/requirement.md"
    outputs:
      - "stdd/specs/features/"
      - "stdd/specs/scenarios/"
    next:
      - stdd-plan
    parallel_with:
      - stdd-api-spec
      - stdd-schema
    metadata:
      priority: required
      category: specification

  stdd-plan:
    description: "极细微任务拆解"
    phase: plan
    inputs:
      - "stdd/specs/features/"
    outputs:
      - "stdd/plans/tasks.md"
      - "stdd/plans/dependencies.json"
    next:
      - stdd-execute
    metadata:
      priority: required
      category: planning

  stdd-prp:
    description: "PRP 结构化规划"
    phase: plan
    inputs:
      - "stdd/approved/requirement.md"
    outputs:
      - "stdd/plans/prp.md"
    metadata:
      priority: high
      category: planning

  # ========== 执行阶段 ==========
  stdd-execute:
    description: "执行 TDD 循环"
    phase: execute
    inputs:
      - "stdd/plans/tasks.md"
    outputs:
      - "src/"
      - "tests/"
    next:
      - stdd-final-doc
    parallel_with:
      - stdd-mock
      - stdd-factory
      - stdd-outside-in
    metadata:
      priority: required
      category: execution

  stdd-apply:
    description: "开始实现"
    phase: execute
    inputs:
      - "stdd/plans/tasks.md"
    outputs:
      - "src/"
    metadata:
      priority: high
      category: execution

  # ========== 验证阶段 (可并行) ==========
  stdd-mutation:
    description: "变异测试"
    phase: verify
    inputs:
      - "tests/"
      - "src/"
    outputs:
      - "stdd/reports/mutation.html"
    metadata:
      priority: high
      category: testing
      parallel_group: verification

  stdd-validate:
    description: "规范验证"
    phase: verify
    inputs:
      - "stdd/specs/"
      - "src/"
    outputs:
      - "stdd/reports/validation.json"
    metadata:
      priority: high
      category: verification
      parallel_group: verification

  stdd-contract:
    description: "契约测试"
    phase: verify
    inputs:
      - "stdd/contracts/"
    outputs:
      - "stdd/reports/contract.json"
    condition: "${has_api} == true"
    metadata:
      priority: medium
      category: testing
      parallel_group: verification

  # ========== 文档阶段 ==========
  stdd-final-doc:
    description: "生成最终需求文档"
    phase: document
    inputs:
      - "stdd/approved/requirement.md"
      - "stdd/plans/tasks.md"
      - "stdd/reports/"
    outputs:
      - "FINAL_REQUIREMENT.md"
    next:
      - stdd-commit
    metadata:
      priority: required
      category: documentation

  # ========== 提交阶段 ==========
  stdd-commit:
    description: "原子化打包与提交"
    phase: commit
    inputs:
      - "src/"
      - "tests/"
      - "FINAL_REQUIREMENT.md"
    outputs:
      - "git commits"
    metadata:
      priority: required
      category: deployment

  # ========== 便捷模式 ==========
  stdd-turbo:
    description: "一键通扫模式"
    phase: all
    metadata:
      priority: low
      category: convenience

  # ========== SDD 增强技能 ==========
  stdd-api-spec:
    description: "API 规范先行"
    phase: spec
    outputs:
      - "stdd/specs/openapi.yaml"
      - "src/types/api.ts"
    condition: "${has_api} == true"
    metadata:
      priority: high
      category: sdd
      parallel_group: specification

  stdd-schema:
    description: "类型规范先行"
    phase: spec
    outputs:
      - "stdd/schemas/"
      - "src/types/"
    metadata:
      priority: high
      category: sdd
      parallel_group: specification

  # ========== TDD 增强技能 ==========
  stdd-outside-in:
    description: "外向内 TDD layer registry 与分层测试骨架"
    phase: execute
    inputs:
      - "stdd/specs/features/"
    outputs:
      - "stdd/tdd-registry.yaml"
      - "stdd/changes/*/outside-in/plan.md"
      - "stdd/changes/*/outside-in/*-*.spec.md"
    metadata:
      priority: high
      category: tdd

  stdd-fix-packet:
    description: "Golden Packet 失败修复上下文"
    phase: repair
    inputs:
      - "stdd/changes/*/tasks.md"
      - "stdd/changes/*/specs/"
      - "stdd/changes/*/evidence/"
    outputs:
      - "stdd/changes/*/evidence/fix-packet-*.md"
      - "stdd/changes/*/evidence/fix-packet-*.json"
    metadata:
      priority: high
      category: repair

  stdd-mock:
    description: "自动 Mock 生成"
    phase: execute
    inputs:
      - "src/services/"
    outputs:
      - "src/__mocks__/"
    metadata:
      priority: medium
      category: tdd
      parallel_group: testing

  stdd-factory:
    description: "测试数据工厂"
    phase: execute
    inputs:
      - "src/types/"
    outputs:
      - "src/__tests__/factories/"
    metadata:
      priority: medium
      category: tdd
      parallel_group: testing

  # ========== 辅助技能 ==========
  stdd-guard:
    description: "TDD 守护钩子"
    phase: all
    metadata:
      priority: high
      category: guard

  stdd-supervisor:
    description: "多 Agent 协调器"
    phase: execute
    metadata:
      priority: high
      category: coordination

  stdd-context:
    description: "三层文档架构"
    phase: all
    metadata:
      priority: high
      category: context

  stdd-iterate:
    description: "自主迭代循环"
    phase: execute
    metadata:
      priority: medium
      category: iteration

  stdd-memory:
    description: "向量数据库记忆"
    phase: all
    metadata:
      priority: low
      category: memory

  stdd-parallel:
    description: "并行执行模式"
    phase: execute
    metadata:
      priority: medium
      category: execution

  stdd-roles:
    description: "多角色协作"
    phase: all
    metadata:
      priority: medium
      category: collaboration

  stdd-metrics:
    description: "质量指标仪表板"
    phase: verify
    metadata:
      priority: low
      category: metrics

  stdd-learn:
    description: "自适应学习系统"
    phase: all
    metadata:
      priority: low
      category: learning

  # ========== 新增 Skills (Phase 2-4) ==========
  stdd-archive:
    description: "Delta Spec Merge 归档并合并规格"
    phase: archive
    inputs:
      - "stdd/changes/*/evidence/"
    outputs:
      - "stdd/specs/"
    metadata:
      priority: required
      category: lifecycle

  stdd-brainstorm:
    description: "多策略头脑风暴与需求探索"
    phase: propose
    outputs:
      - "stdd/reports/brainstorm.md"
    metadata:
      priority: medium
      category: exploration

  stdd-builder:
    description: "创建自定义 Agent、工作流和 Skill"
    phase: all
    outputs:
      - "stdd/builders/"
    metadata:
      priority: medium
      category: generation

  stdd-certainty:
    description: "5 维度信心评分"
    phase: propose
    outputs:
      - "stdd/reports/certainty.json"
    metadata:
      priority: medium
      category: assessment

  stdd-complexity:
    description: "代码复杂度分析"
    phase: verify
    outputs:
      - "stdd/reports/complexity.json"
    metadata:
      priority: medium
      category: metrics

  stdd-constitution:
    description: "9 篇质量宪法检查与管理"
    phase: all
    outputs:
      - "stdd/reports/constitution.json"
    metadata:
      priority: high
      category: governance

  stdd-continue:
    description: "断点续传，继续中断的工作"
    phase: all
    metadata:
      priority: high
      category: lifecycle

  stdd-dashboard:
    description: "生成静态 HTML 仪表板"
    phase: verify
    outputs:
      - "stdd/dashboard/index.html"
    metadata:
      priority: low
      category: visualization

  stdd-design:
    description: "设计系统文档与 Design Token 生成"
    phase: propose
    outputs:
      - "DESIGN.md"
    metadata:
      priority: medium
      category: design

  stdd-docs:
    description: "静态文档站点生成与部署"
    phase: document
    outputs:
      - "stdd/docs-site/"
    metadata:
      priority: medium
      category: documentation

  stdd-explore:
    description: "深度项目探索与分析"
    phase: init
    outputs:
      - "stdd/memory/exploration.md"
    metadata:
      priority: high
      category: exploration

  stdd-ff:
    description: "Fast-Forward 快速提案→规格→任务"
    phase: all
    metadata:
      priority: high
      category: convenience

  stdd-graph:
    description: "Skill Graph 可视化与分析"
    phase: all
    metadata:
      priority: low
      category: visualization

  stdd-help:
    description: "上下文感知帮助系统"
    phase: all
    metadata:
      priority: low
      category: assistance

  stdd-issue:
    description: "Bug 修复变更创建"
    phase: propose
    outputs:
      - "stdd/changes/bugfix-*/"
    metadata:
      priority: high
      category: lifecycle

  stdd-modules:
    description: "STDD 模块市场浏览与管理"
    phase: all
    metadata:
      priority: low
      category: marketplace

  stdd-new:
    description: "创建新变更"
    phase: propose
    outputs:
      - "stdd/changes/new-*/"
    metadata:
      priority: required
      category: lifecycle

  stdd-product-proposal:
    description: "产品提案文档生成"
    phase: propose
    outputs:
      - "stdd/product-proposal.md"
    metadata:
      priority: medium
      category: exploration

  stdd-profile:
    description: "自适应规划深度检测"
    phase: plan
    outputs:
      - "stdd/profile.json"
    metadata:
      priority: medium
      category: planning

  stdd-ui:
    description: "前端页面与组件生成"
    phase: execute
    outputs:
      - "stdd/ui/"
    metadata:
      priority: medium
      category: generation

  stdd-user-test:
    description: "用户测试脚本与框架骨架生成"
    phase: verify
    outputs:
      - "stdd/changes/*/user-test/"
    metadata:
      priority: medium
      category: testing

  stdd-verify:
    description: "变更验证与宪法检查"
    phase: verify
    inputs:
      - "stdd/changes/*/tasks.md"
      - "stdd/changes/*/evidence/"
    outputs:
      - "stdd/changes/*/evidence/verify.json"
    metadata:
      priority: required
      category: verification

  stdd-vision:
    description: "项目愿景文档管理"
    phase: propose
    outputs:
      - "stdd/vision.md"
    metadata:
      priority: medium
      category: exploration

# 依赖关系
dependencies:
  stdd-spec:
    requires:
      - stdd-confirm
    optional:
      - stdd-api-spec
      - stdd-schema

  stdd-plan:
    requires:
      - stdd-spec

  stdd-execute:
    requires:
      - stdd-plan
    optional:
      - stdd-outside-in
      - stdd-mock
      - stdd-factory

  stdd-fix-packet:
    requires:
      - stdd-apply

  stdd-final-doc:
    requires:
      - stdd-execute

  stdd-commit:
    requires:
      - stdd-final-doc
      - stdd-mutation
      - stdd-validate

# 并行组定义
parallel_groups:
  verification:
    skills:
      - stdd-mutation
      - stdd-validate
      - stdd-contract
    strategy: "all"  # all, any, race

  specification:
    skills:
      - stdd-api-spec
      - stdd-schema
    strategy: "all"

  testing:
    skills:
      - stdd-mock
      - stdd-factory
      - stdd-outside-in
    strategy: "any"

# 条件规则
conditions:
  clarification_complete:
    type: "file_exists"
    path: "stdd/drafts/clarification.json"

  has_api:
    type: "file_pattern"
    pattern: "src/api/**/*.ts"

  has_database:
    type: "file_pattern"
    pattern: "**/migrations/**/*.sql"

  tests_pass:
    type: "command"
    command: "npm test"
    expected: "exit_code:0"

# 钩子定义
hooks:
  pre_execute:
    - skill: stdd-guard
      condition: "always"

  post_execute:
    - skill: stdd-metrics
      condition: "tests_pass"

  on_failure:
    - skill: stdd-iterate
      max_retries: 3
